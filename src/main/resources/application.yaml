spring:
  application:
    name: commerce
  config:
    import:
      - optional:${spring.profiles.active}/db.yaml
      - optional:${spring.profiles.active}/logging.yaml
      - optional:${spring.profiles.active}/management.yaml

---
spring:
  config:
    activate:
      on-profile: local
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  docker:
    compose:
      lifecycle-management: start-only
